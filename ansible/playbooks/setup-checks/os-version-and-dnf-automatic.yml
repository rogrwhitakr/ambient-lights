---
- name: 1. Gather facts and set host_info for reachable remote hosts
  hosts: all
  gather_facts: yes

  tasks:
    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Set host details as a fact
      ansible.builtin.set_fact:
        host_info:
          hostname: "{{ ansible_hostname }}"
          os_version: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
          dnf_automatic_status: >-
            {% if 'dnf-automatic' in ansible_facts.packages %}
            Installed ✅
            {% else %}
            Not Installed ❌
            {% endif %}

    - name: Save list of reachable hosts on controller
      ansible.builtin.set_fact:
        reachable_hosts: "{{ ansible_play_hosts }}"
      delegate_to: localhost
      delegate_facts: true
      run_once: true

    - name: Clear errors so play exits successfully
      meta: clear_host_errors
      
- name: 2. Build and display the table on the control node
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Build the reporting list from reachable hosts only
      ansible.builtin.set_fact:
        report_data: >-
          {{ report_data | default([]) + [hostvars[item]['host_info']] }}
      loop: "{{ hostvars['localhost']['reachable_hosts'] | default([]) }}"

    - name: Display table on the control node
      ansible.builtin.debug:
        msg: |
          {% set table_header = '| Server | Operating System | DNF Automatic Status |' %}
          {% set table_separator = '| :--- | :--- | :--- |' %}
          {{ table_header }}
          {{ table_separator }}
          {% for host_details in report_data | default([]) %}
          | {{ host_details.hostname }} | {{ host_details.os_version }} | {{ host_details.dnf_automatic_status | trim }} |
          {% endfor %}