---
- name: Proxmox Cluster Sequential Update and Reboot
  hosts: proxmox_nodes
  become: true
  # ensures only one node is updated and rebooted at a time
  serial: 1

  tasks:
    - name: Clean up apt cache and remove unused packages
      apt:
        autoremove: yes
        purge: yes
        update_cache: yes

    - name: Update all packages to the latest version (dist-upgrade)
      apt:
        upgrade: dist
        force_apt_get: yes # Recommended for Proxmox to handle complex dependencies
      register: upgrade_result

    - name: Reboot the machine and wait for it to come back online
      ansible.builtin.reboot:
        msg: "Rebooting node after Proxmox dist-upgrade"
        reboot_timeout: 300 # Maximum time to wait for the reboot (5 minutes)
        connect_timeout: 5 # Timeout for a single connection attempt
        pre_reboot_delay: 0 # Seconds to wait before shutting down
        post_reboot_delay: 0 # Seconds to wait after the system is up before continuing
        test_command: whoami # Command to run on the managed host to confirm it's ready
      when: upgrade_result.changed