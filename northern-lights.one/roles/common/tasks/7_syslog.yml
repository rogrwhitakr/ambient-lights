---
- name: Ensure rsyslog and mmjsonparse are installed
  ansible.builtin.dnf:
    name:
      - rsyslog
      - rsyslog-mmjsonparse
    state: latest
  notify: Restart rsyslog

- name: Deploy manual GELF-JSON rsyslog configuration
  ansible.builtin.template:
    src: rsyslog_gelf.conf.j2
    dest: /etc/rsyslog.d/99-graylog-gelf.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart rsyslog

- name: Remove old rsyslog Graylog configuration file
  ansible.builtin.file:
    path: /etc/rsyslog.d/99-graylog.conf
    state: absent
  notify: Restart rsyslog

- name: Ensure rsyslog service is started and enabled
  ansible.builtin.systemd:
    name: rsyslog
    state: started
    enabled: yes