---
# defaults file for server_common
ansible_python_interpreter: /usr/bin/python3

default:
  - nano
  - fail2ban
  - zstd
  
monitor:
  - htop
  - sysstat
  - iotop
  - dmidecode
  - hyperfine

selinux:
  - libselinux-python3
  - policycoreutils-python-utils

powerline:
  - powerline
  - powerline-fonts

packages:
  - 'dnf-automatic'


# Graylog Server Verbindung
rsyslog_graylog_target: "graylog.fritz.box"
rsyslog_graylog_port: 12201
rsyslog_graylog_protocol: "udp"

# Standard-Tags für die GELF-Struktur
rsyslog_tag_env: "production"
rsyslog_tag_role: "generic"
rsyslog_tag_layer: "os"