---
# tasks file for docker

- name: "install docker"
  block:

  - name: "install dnf plugin"
    ansible.builtin.dnf: 
      name: "dnf-plugins-core"
      state: latest

  - name: "install selinux container component"
    ansible.builtin.dnf: 
      name: "{{ selinux }}"
      state: latest

  - name: "install docker Community edition"
    ansible.builtin.dnf:
      name: "{{ docker_ce }}"
      state: latest
    notify: "start docker service"

  - name: Ensure group "docker" exists with correct gid
    ansible.builtin.group:
      name: docker
      state: present
      gid: 1750

  - name: "Add the BECOME user to the docker group"
    ansible.builtin.user:
      name: admin
      groups: docker,wheel

  when:
  - ansible_facts['pkg_mgr'] == "dnf5"