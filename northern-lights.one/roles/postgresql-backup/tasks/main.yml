---
# tasks file for postgresql-backup
tasks:
  - name: Fail if db_name was not provided
    ansible.builtin.fail:
      msg: "Provide DB_NAME as environment variable or -e db_name=mydb"
    when: db_name is not defined or db_name | length == 0

  - name: Ensure backup directory exists
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: directory
      owner: "{{ backup_user }}"
      group: "{{ backup_group }}"
      mode: "0750"

  - name: Deploy service template
    ansible.builtin.template:
      src: templates/psql-backup@.service.j2
      dest: /etc/systemd/system/psql-backup@.service
      owner: root
      group: root
      mode: "0644"
    notify: Reload systemd

  - name: Deploy timer template
    ansible.builtin.template:
      src: templates/psql-backup@.timer.j2
      dest: /etc/systemd/system/psql-backup@.timer
      owner: root
      group: root
      mode: "0644"
    notify: Reload systemd

  - name: Flush handlers so systemd sees new units
    ansible.builtin.meta: flush_handlers

  - name: Enable and start timer instance
    ansible.builtin.systemd_service:
      name: "psql-backup@{{ db_name }}.timer"
      enabled: true
      state: started
